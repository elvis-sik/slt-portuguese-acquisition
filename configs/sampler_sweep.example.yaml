model_checkpoint: results/01_scientific_pilot/checkpoints/middle
reference_manifest: data/manifests/portuguese_sampler_reference.json
sampler: rmsprop_sgld
precision: fp32
batch_size: 32
sequence_length: 128
coarse_grid:
  learning_rate: [1.0e-6, 1.0e-5, 1.0e-4]
  n_beta: [1, 10, 100]
  localization: [10, 100, 1000]
short_run:
  num_chains: 1
  num_burnin_steps: 50
  num_draws: 25
  num_steps_between_draws: 1
cross_check:
  checkpoints: [early, middle, late]
  num_chains: 2
  num_burnin_steps: 100
  num_draws: 50
  num_steps_between_draws: 2
final:
  num_chains: 3
  num_burnin_steps: 200
  num_draws: 100
  num_steps_between_draws: 2
selection_rule: >-
  Choose one common setting that passes the recorded trace criteria at all three
  cross-check checkpoints. Do not optimize settings separately per checkpoint.
